<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        div {
            width: 100%;
            height: 500px;
            overflow-wrap: break-word;
            word-wrap: break-word;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script>
        fetch("https://2024.ipchaxun.com").then(res => {
            return res.json()
        }).then(res => {
            const unicodeStr = JSON.stringify(res)
            // const encoder = new TextEncoder();
            // const utf8Array = encoder.encode(unicodeStr);
            // const binaryStr = String.fromCharCode(...utf8Array);
            // const base64Encoded = btoa(binaryStr);
            document.getElementById('app').innerText = encodeURIComponent(unicodeStr)
        })
    </script>
</body>

</html>
