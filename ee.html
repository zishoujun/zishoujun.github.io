<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        div {
            width: 100%;
            height: 500px;
            overflow-wrap: break-word;
            word-wrap: break-word;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div style="width: 100%;display: flex;height: auto;">
        <input type="text" id="input" style="flex:1">
        <button onclick="onbtnClick()">解密</button>
    </div>
    <div id="app"></div>
    <script>
        function onbtnClick() {
            const value = document.getElementById('input').value
            const decodedBinaryStr = atob(value);
            const decodedUtf8Array = Uint8Array.from(decodedBinaryStr, c => c.charCodeAt(0));
            const decoder = new TextDecoder();
            const decodedStr = decoder.decode(decodedUtf8Array);
            document.getElementById('app').innerText = decodedStr
        }
    </script>
</body>

</html>
